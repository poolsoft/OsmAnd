name: Build CarLauncher.apk
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout OsmAnd
      uses: actions/checkout@v6
      with:
        path: android
    - name: checkout OsmAnd-resources
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-resources
        path: resources
    - name: checkout OsmAnd-core
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-core
        path: core
    - name: checkout OsmAnd-core-legacy
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-core-legacy
        path: core-legacy
    - name: checkout OsmAnd-build
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-build
        path: build
    - name: checkout OsmAnd-tools
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-tools
        path: tools
    - name: checkout OsmAnd-misc
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-misc
        path: misc

    - name: Setup Android SDK and NDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'ndk;25.1.8937393'

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      working-directory: ./android
      run: chmod +x gradlew

    - name: Prepare Dynamic Version Info
      working-directory: ./android
      run: |
        # OsmAnd ana surumunu build.gradle'dan akilli sekilde oku (sadece tırnak içindeki sayıları hedefle)
        BASE_VERSION=$(grep -E 'versionName\s+"[0-9.]+"' OsmAnd/build.gradle | head -n 1 | sed -E 's/.*"([0-9.]+)".*/\1/')
        if [ -z "$BASE_VERSION" ]; then BASE_VERSION="5.4.0"; fi
        
        COMMIT_COUNT=$(git rev-list --count HEAD)
        SHORT_SHA=$(git rev-parse --short HEAD)
        
        VERSION_NAME="${BASE_VERSION}-rev${COMMIT_COUNT}-${SHORT_SHA}"
        VERSION_CODE=$((COMMIT_COUNT + 5000))
        
        echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
        echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
        echo "{\"versionCode\": ${VERSION_CODE}, \"versionName\": \"${VERSION_NAME}\", \"apkUrl\": \"https://github.com/${{ github.repository }}/releases/latest/download/CarLauncher.apk\"}" > version.json

    - name: Build with Gradle
      working-directory: ./android
      run: ./gradlew assemblecarlauncherLegacyFatDebug -PversionCode=${{ env.VERSION_CODE }} -PversionName="${{ env.VERSION_NAME }}" -x test --no-daemon

    - name: Rename APK
      working-directory: ./android
      run: cp OsmAnd/build/outputs/apk/carlauncherLegacyFat/debug/OsmAnd-carlauncher-legacy-fat-debug.apk CarLauncher.apk

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarLauncher-APK
        path: android/CarLauncher.apk

    - name: Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest CarLauncher Build
        body: |
          Son derleme: ${{ env.VERSION_NAME }}
          Commit: ${{ github.sha }}
        files: |
          android/CarLauncher.apk
          android/version.json
        draft: false
        prerelease: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
